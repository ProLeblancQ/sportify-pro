services:
  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sportify_pro
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  back:
    build: ./BACK
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: mysql://root:root@db:3306/sportify_pro
      JWT_SECRET: une_chaine_secrete_longue_et_aleatoire
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy

  front:
    build:
      context: ./FRONT
      args:
        VITE_API_URL: http://localhost:3000
    ports:
      - "5173:80"
    depends_on:
      - back

volumes:
  mysql_data:
